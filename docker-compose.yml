services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: gc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gameconveyor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gc_secret_password_change_me}
      POSTGRES_DB: gameconveyor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameconveyor -d gameconveyor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gc-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://gameconveyor:${DB_PASSWORD:-gc_secret_password_change_me}@db:5432/gameconveyor
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_me_in_production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
